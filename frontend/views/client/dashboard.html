<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi aprendizaje | Academia Chico</title>
</head>
<body>
  <main class="dashboard-page">
    <header class="dashboard-header">
      <a href="./" class="logo" data-route>
        <img src="frontend/assets/logo.png" alt="Logo">
        <span>Academia Chico</span>
      </a>
      <button id="logoutButton" type="button">Cerrar sesion</button>
    </header>

    <section class="welcome-card">
      <p class="eyebrow">Panel del estudiante</p>
      <h1 id="welcomeTitle">Bienvenido</h1>
      <p>Tu cuenta esta activa. Aqui apareceran tus cursos y tu progreso.</p>

      <div class="dashboard-grid">
        <article>
          <strong>0</strong>
          <span>Cursos activos</span>
        </article>
        <article>
          <strong>0%</strong>
          <span>Progreso total</span>
        </article>
        <article>
          <strong>0</strong>
          <span>Certificados</span>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
