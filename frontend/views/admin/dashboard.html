<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Administracion | Academia Chico</title>
</head>
<body>
  <main class="admin-page">
    <aside class="admin-sidebar">
      <a href="./" class="admin-logo" data-route>
        <img src="frontend/assets/logo.png" alt="Logo">
        <span>Academia Chico</span>
      </a>

      <nav>
        <a href="admin/dashboard" class="active" data-route>
          <i class="fa-solid fa-chart-line"></i>
          Resumen
        </a>
      </nav>

      <button id="adminLogoutButton" type="button">
        <i class="fa-solid fa-right-from-bracket"></i>
        Cerrar sesion
      </button>
    </aside>

    <section class="admin-content">
      <header>
        <div>
          <p class="eyebrow">Panel administrativo</p>
          <h1 id="adminWelcomeTitle">Bienvenido</h1>
        </div>
        <span class="role-badge">Administrador</span>
      </header>

      <div class="admin-grid">
        <article>
          <i class="fa-solid fa-users"></i>
          <strong>Usuarios</strong>
          <span>Gestion disponible proximamente</span>
        </article>
        <article>
          <i class="fa-solid fa-graduation-cap"></i>
          <strong>Cursos</strong>
          <span>Gestion disponible proximamente</span>
        </article>
        <article>
          <i class="fa-solid fa-chart-simple"></i>
          <strong>Reportes</strong>
          <span>Metricas disponibles proximamente</span>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
